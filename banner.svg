<svg width="860" height="210" viewBox="0 0 860 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scan {
        0%   { transform: translateY(0px);  opacity: 0; }
        8%   { opacity: 1; }
        92%  { opacity: 1; }
        100% { transform: translateY(210px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1; }
      }
      @keyframes blink {
        0%, 49%  { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .scanline { animation: scan 6s linear infinite; }
      .glow-pulse { animation: pulse 3.5s ease-in-out infinite; }
      .cursor    { animation: blink 1.1s step-end infinite; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060b14"/>
      <stop offset="100%" stop-color="#0b1525"/>
    </linearGradient>

    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>

    <filter id="f-white" x="-8%" y="-40%" width="116%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="f-cyan" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#00b4d8" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>

    <clipPath id="clip">
      <rect width="860" height="210"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="860" height="210" fill="url(#bg)"/>
    <rect width="860" height="210" fill="url(#grid)"/>
    <rect width="860" height="210" fill="url(#center-glow)"/>

    <!-- Scan line sweep -->
    <rect class="scanline" x="0" y="0" width="860" height="2" fill="rgba(0,180,216,0.08)"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="3" height="210" fill="#00b4d8" opacity="0.75"/>

    <!-- Top rule -->
    <line x1="18" y1="24" x2="842" y2="24" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.18"/>
    <!-- Bottom rule -->
    <line x1="18" y1="186" x2="842" y2="186" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.18"/>

    <!-- Corner brackets — top-left -->
    <path d="M 16 42 L 16 20 L 40 20" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Corner brackets — top-right -->
    <path d="M 820 20 L 844 20 L 844 42" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Corner brackets — bottom-left -->
    <path d="M 16 168 L 16 190 L 40 190" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Corner brackets — bottom-right -->
    <path d="M 820 190 L 844 190 L 844 168" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- ── MAIN TITLE: CLAUDE CODE ── -->
    <!-- depth shadow -->
    <text x="433" y="103" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="62" font-weight="bold"
          fill="#00b4d8" opacity="0.05">CLAUDE CODE</text>
    <!-- main white text -->
    <text x="430" y="100" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="62" font-weight="bold"
          fill="#dde8f4" filter="url(#f-white)">CLAUDE CODE</text>

    <!-- thin divider between the two title lines -->
    <line x1="200" y1="112" x2="660" y2="112" stroke="#00b4d8" stroke-width="0.5" stroke-opacity="0.35"/>

    <!-- ── MAIN TITLE: DOCS ── -->
    <text class="glow-pulse" x="430" y="157" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="62" font-weight="bold"
          fill="#00b4d8" filter="url(#f-cyan)" letter-spacing="22">DOCS</text>

    <!-- blinking cursor after DOCS -->
    <rect class="cursor" x="635" y="119" width="10" height="42" fill="#00b4d8" opacity="0.65"/>

    <!-- ── SUBTITLE ── -->
    <text x="430" y="176" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="10"
          fill="#7d8590" opacity="0.55" letter-spacing="3">Claude Code 공식 문서 아카이브  ·  KO / EN</text>

    <!-- bottom-right doc count -->
    <text x="836" y="200"
          text-anchor="end"
          font-family="'Courier New',Courier,monospace" font-size="8"
          fill="#00b4d8" opacity="0.3" letter-spacing="1.5">47 DOCUMENTS</text>

    <!-- bottom-left version -->
    <text x="24" y="200"
          font-family="'Courier New',Courier,monospace" font-size="8"
          fill="#00b4d8" opacity="0.3" letter-spacing="1.5">2026</text>
  </g>
</svg>
